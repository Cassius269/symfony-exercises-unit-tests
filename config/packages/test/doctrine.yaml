doctrine:
    dbal:
        # On définit l'utilisation de SQLite
        driver: pdo_sqlite
        # On définit le chemin vers la base de données
        path: "%kernel.cache_dir%/bdd_test.db" # le nom personnalisé de la bdd est bdd_test
        # On déclare que le fichier n'est pas sur une URL distante
        url: null
